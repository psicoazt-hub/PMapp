<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PACHUCOS MEN - APP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --gris: #121212; --rojo: #cc0000; }
        * { box-sizing: border-box; }
        body { background: var(--fondo); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 220px; background: #0a0a0a; border-right: 1px solid #222; display: flex; flex-direction: column; padding-top: 20px; flex-shrink: 0; }
        .nav-btn { background: transparent; border: none; color: #666; padding: 18px 25px; text-align: left; font-size: 13px; cursor: pointer; border-left: 4px solid transparent; transition: 0.3s; font-weight: bold; text-transform: uppercase; }
        .nav-btn.active { color: var(--oro); border-left: 4px solid var(--oro); background: #111; }
        main { flex: 1; padding: 25px; overflow-y: auto; background: radial-gradient(circle at top, #111, #000); }
        .section { display: none; max-width: 900px; margin: 0 auto; }
        .section.active { display: block; }
        .year-header { color: var(--oro); font-size: 26px; text-align: center; margin: 40px 0 20px; font-weight: 900; letter-spacing: 3px; border-top: 1px double #333; padding-top: 20px; }
        .mes-header { color: #888; font-size: 18px; border-bottom: 1px solid #333; margin: 20px 0 10px; padding-bottom: 5px; text-transform: uppercase; }
        .jale-card { background: var(--gris); border: 1px solid #222; padding: 15px; margin-bottom: 8px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .btn-op { background: none; border: 1px solid #444; color: white; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-size: 11px; margin-left: 5px; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; background: #0a0a0a; border: 1px solid #333; color: white; border-radius: 5px; font-size: 16px; }
        .btn-japo { background: var(--oro); color: black; border: none; padding: 18px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 16px; margin-top: 10px; }
        #canvas-wrap { background: #222; padding: 10px; border-radius: 8px; display: inline-block; width: 100%; }
        #canvas { width: 100%; height: 500px; border: 2px solid var(--oro); position: relative; overflow: hidden; background: white; border-radius: 5px; }
        .asset-row { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; border-bottom: 1px solid #222; }
        .thumb { width: 85px; height: 85px; object-fit: cover; border: 1px solid #444; cursor: pointer; flex-shrink: 0; background: #000; border-radius: 5px; }
        .drag { position: absolute; cursor: move; user-select: none; white-space: nowrap; }
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center; flex-direction:column; padding: 20px; }
        #modal-content { max-width: 90%; max-height: 80%; }
        canvas.sig { background: white; width: 100%; height: 130px; border-radius: 5px; border: 1px solid var(--oro); touch-action: none; }
    </style>
</head>
<body>

<div id="modal">
    <div id="modal-content"></div>
    <div style="margin-top:20px; display:flex; gap:10px;">
        <button class="btn-japo" style="background:#25D366; color:white;" id="btn-share-gal">COMPARTIR</button>
        <button class="btn-japo" onclick="document.getElementById('modal').style.display='none'">CERRAR</button>
    </div>
</div>

<nav id="sidebar">
    <div style="text-align:center; padding-bottom:30px;"><h2 style="color:var(--oro); margin:0;">PACHUCOS</h2><small style="color:#555">MEN 2026</small></div>
    <button class="nav-btn active" onclick="ver('age')">📝 AGENDA</button>
    <button class="nav-btn" onclick="ver('add')">➕ AGREGAR FECHA</button>
    <button class="nav-btn" onclick="ver('cal')">📅 CALENDARIO</button>
    <button class="nav-btn" onclick="ver('gal')">🖼️ GALERÍA</button>
    <button class="nav-btn" onclick="ver('fly')">🎨 FLYERS</button>
    <button class="nav-btn" onclick="ver('con')">📜 CONTRATOS</button>
</nav>

<main>
    <section id="age" class="section active">
        <h1 style="color:var(--oro); margin:0;">AGENDA ACTUAL</h1>
        <div id="lista-agenda">Cargando fechas...</div>
        <button class="btn-japo" style="background:#25D366; color:white;" onclick="compartirAgenda()">COMPARTIR AGENDA (WA)</button>
    </section>

    <section id="add" class="section">
        <h1 id="f-tit">NUEVO REGISTRO</h1>
        <div style="display:flex; gap:10px;">
            <input type="number" id="f-anio" value="2026">
            <select id="f-mes">
                <option value="1">Enero</option><option value="2">Febrero</option><option value="3">Marzo</option><option value="4">Abril</option><option value="5">Mayo</option><option value="6">Junio</option>
                <option value="7">Julio</option><option value="8">Agosto</option><option value="9">Septiembre</option><option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
            </select>
            <input type="number" id="f-dia" placeholder="Día">
        </div>
        <select id="f-rep"><option value="">¿Quién agendó?</option><option value="JOSÉ">JOSÉ</option><option value="CHAVA">CHAVA</option><option value="TOÑO">TOÑO</option><option value="OTROS">OTROS</option></select>
        <input type="text" id="f-lug" placeholder="Lugar"><input type="text" id="f-hor" placeholder="Hora de inicio"><input type="text" id="f-tie" placeholder="Hrs de tocada">
        <input type="hidden" id="edit-idx" value="-1">
        <button class="btn-japo" id="save-btn" onclick="confirmarRegistro()">ACEPTAR / GUARDAR</button>
        <button class="btn-japo" style="background:#333;" onclick="cancelarRegistro()">CANCELAR</button>
    </section>

    <section id="cal" class="section">
        <h1>CALENDARIO</h1>
        <div id="cal-box" style="background:#111; padding:15px; border-radius:10px;"></div>
    </section>

    <section id="gal" class="section">
        <h1>GALERÍA (BODEGA)</h1>
        <div id="gal-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
    </section>

    <section id="fly" class="section">
        <h1>DISEÑADOR DE FLYER</h1>
        <div id="canvas-wrap">
            <div id="canvas"></div>
        </div>
        <input type="text" id="fly-txt" placeholder="Escribe aquí el texto" style="margin-top:10px;">
        <p>Logos Pachucos:</p><div class="asset-row" id="l-log"></div>
        <p>Estilos Títulos:</p><div class="asset-row" id="l-tit"></div>
        <p>Estilos Fechas:</p><div class="asset-row" id="l-fec"></div>
        <button class="btn-japo" onclick="crearTextoFlyer()">GENERAR TEXTO</button>
        <button class="btn-japo" style="background:white; color:black;" onclick="exportarFlyer()">DESCARGAR FLYER</button>
    </section>

    <section id="con" class="section">
        <h1>CONTRATOS</h1>
        <input type="text" placeholder="Datos del Evento">
        <div style="display:flex; gap:15px; margin-top:20px;">
            <div style="flex:1; text-align:center;"><small>FIRMA REP.</small><canvas id="p1" class="sig"></canvas></div>
            <div style="flex:1; text-align:center;"><small>FIRMA CLIENTE</small><canvas id="p2" class="sig"></canvas></div>
        </div>
    </section>
</main>

<script>
    const USER = 'psicoazt-hub', REPO = 'PMapp', TOKEN = 'ghp_42y7mHwXwH6vXwHwH6vHwH6vXwHwH6vHw';
    let agenda = [], estiloFlyer = { color: 'black' };
    const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

    const ASSETS = {
        BODEGA: ["VN20251209_045334.mp4", "download_20251208_090855_0000.mp4", "Diseño sin título_20251208_090215_0000.mp4", "VID-20250304-WA0067.mp4", "origin_1768640677638.png", "Black White Torn Paper Photography Portfolio Cover Page_20260317_084528_0000.png", "BackgroundEraser_20251218_105209714.png"],
        LOGOS: ["origin_1768640677638.png", "BackgroundEraser_20251218_105209714.png"],
        TITULOS: ["retouch_1768231909098.JPEG", "retouch_1768073937394.JPEG"],
        FECHAS: ["BackgroundEraser_20260131_140230680.png"]
    };

    function ver(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        const btn = Array.from(document.querySelectorAll('.nav-btn')).find(b => b.getAttribute('onclick').includes(id));
        if(btn) btn.classList.add('active');
        
        if(id === 'age') loadAgenda();
        if(id === 'cal') renderCal();
        if(id === 'gal') loadAssets(ASSETS.BODEGA, 'gal-grid', 'gal');
        if(id === 'fly') { loadAssets(ASSETS.LOGOS, 'l-log', 'fly'); loadAssets(ASSETS.TITULOS, 'l-tit', 'fly'); loadAssets(ASSETS.FECHAS, 'l-fec', 'fly'); }
    }

    async function loadAgenda() {
        try {
            const r = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/agenda.json?t=${Date.now()}`, { headers: { Authorization: `token ${TOKEN}` } });
            const d = await r.json(); 
            const decoded = decodeURIComponent(escape(atob(d.content)));
            const nueva = JSON.parse(decoded);
            
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            agenda = nueva.filter(f => {
                const fv = new Date(f.anio, f.mes-1, f.dia);
                fv.setDate(fv.getDate() + 1);
                return fv >= hoy;
            });
            
            agenda.sort((a,b) => {
                const da = new Date(a.anio, a.mes-1, a.dia), db = new Date(b.anio, b.mes-1, b.dia);
                if(da - db !== 0) return da - db;
                return (parseInt(a.hora) || 99) - (parseInt(b.hora) || 99);
            });
            renderAgendaUI();
        } catch(e) { console.error(e); document.getElementById('lista-agenda').innerHTML = "Error al conectar."; }
    }

    function renderAgendaUI() {
        let h = "", y = "", m = "";
        agenda.forEach((f, i) => {
            if(y !== f.anio) { y = f.anio; h += `<div class="year-header">🔥 PACHUCOS ${y} 🔥</div>`; }
            if(m !== f.mes) { m = f.mes; h += `<div class="mes-header">${MESES[f.mes-1]}</div>`; }
            h += `<div class="jale-card">
                    <div><h3>${f.dia} - ${f.representante}</h3><p>${f.lugar} | ${f.hora} | ${f.tiempo}</p></div>
                    <div><button class="btn-op" onclick="editarRegistro(${i})">✏️</button><button class="btn-op" style="color:var(--rojo)" onclick="borrarRegistro(${i})">🗑️</button></div>
                  </div>`;
        });
        document.getElementById('lista-agenda').innerHTML = h || "<p>Sin fechas registradas.</p>";
    }

    async function syncAgenda(msg) {
        const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/agenda.json`, { headers: { Authorization: `token ${TOKEN}` } });
        const json = await res.json();
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(agenda))));
        await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/agenda.json`, {
            method: 'PUT', headers: { Authorization: `token ${TOKEN}` },
            body: JSON.stringify({ message: msg, content: content, sha: json.sha })
        });
    }

    function confirmarRegistro() {
        if(!document.getElementById('f-dia').value || !document.getElementById('f-rep').value) return alert("Faltan datos obligatorios.");
        if(confirm("¿Guardar este jale?")) guardarRegistro();
    }

    async function guardarRegistro() {
        const j = { 
            anio: document.getElementById('f-anio').value, 
            mes: document.getElementById('f-mes').value, 
            dia: document.getElementById('f-dia').value, 
            representante: document.getElementById('f-rep').value, 
            lugar: document.getElementById('f-lug').value || "?", 
            hora: document.getElementById('f-hor').value || "?", 
            tiempo: document.getElementById('f-tie').value || "?" 
        };
        const idx = parseInt(document.getElementById('edit-idx').value);
        if(idx > -1) agenda[idx] = j; else agenda.push(j);
        
        await syncAgenda("Actualización Agenda");
        alert("¡Hecho!");
        resetForm();
        ver('age');
    }

    function resetForm() {
        document.getElementById('edit-idx').value = "-1";
        document.getElementById('f-tit').innerText = "NUEVO REGISTRO";
        document.getElementById('f-dia').value = "";
        document.getElementById('f-lug').value = "";
        document.getElementById('f-hor').value = "";
        document.getElementById('f-tie').value = "";
        document.getElementById('f-rep').value = "";
    }

    function cancelarRegistro() { if(confirm("¿Cancelar registro?")) { resetForm(); ver('age'); } }
    function borrarRegistro(i) { if(confirm("¿Eliminar definitivamente?")) { agenda.splice(i,1); syncAgenda("Borrado"); loadAgenda(); } }
    function editarRegistro(i) { 
        const f = agenda[i]; 
        document.getElementById('f-anio').value=f.anio; document.getElementById('f-mes').value=f.mes; 
        document.getElementById('f-dia').value=f.dia; document.getElementById('f-rep').value=f.representante; 
        document.getElementById('f-lug').value=f.lugar; document.getElementById('f-hor').value=f.hora; 
        document.getElementById('f-tie').value=f.tiempo; document.getElementById('edit-idx').value=i; 
        document.getElementById('f-tit').innerText = "MODIFICAR REGISTRO";
        ver('add'); 
    }

    function loadAssets(list, target, mode) {
        document.getElementById(target).innerHTML = list.map(n => {
            const url = `https://raw.githubusercontent.com/${USER}/${REPO}/main/${n}`;
            const isVideo = n.toLowerCase().endsWith('.mp4');
            const clickAction = mode === 'gal' ? `abrirModalGal('${url}', ${isVideo})` : `seleccionarAssetFlyer('${url}', ${isVideo})`;
            
            if(isVideo) return `<video src="${url}" class="thumb" muted preload="metadata" onclick="${clickAction}"></video>`;
            return `<img src="${url}" class="thumb" onclick="${clickAction}">`;
        }).join('');
    }

    function abrirModalGal(u, isVid) {
        const mod = document.getElementById('modal');
        const cont = document.getElementById('modal-content');
        cont.innerHTML = isVid ? `<video src="${u}" controls autoplay style="width:100%"></video>` : `<img src="${u}" style="width:100%">`;
        document.getElementById('btn-share-gal').onclick = () => window.open(`https://wa.me/?text=${encodeURIComponent('Mira este material de Pachucos Men: ' + u)}`);
        mod.style.display = 'flex';
    }

    function seleccionarAssetFlyer(u, isVid) {
        if(isVid) return alert("Los videos no se pueden usar en Flyers.");
        if(u.includes('retouch') || u.includes('Eraser')) {
            estiloFlyer.color = u.includes('ORO') ? '#d4af37' : '#fff';
            alert("Estilo de texto cargado: " + (u.includes('ORO') ? 'ORO' : 'PLATA'));
        } else {
            const i = document.createElement('img'); i.src = u; i.className = 'drag'; i.style.width = "150px"; 
            makeDraggable(i); document.getElementById('canvas').appendChild(i);
        }
    }

    function crearTextoFlyer() {
        const txt = document.getElementById('fly-txt').value; if(!txt) return;
        const d = document.createElement('div'); d.className = 'drag'; d.innerText = txt.toUpperCase();
        d.style.color = estiloFlyer.color; d.style.fontSize = "45px"; d.style.fontWeight = "bold"; d.style.textShadow = "3px 3px 6px #000";
        makeDraggable(d); document.getElementById('canvas').appendChild(d);
    }

    function makeDraggable(el) {
        let x=0,y=0,mx=0,my=0; el.onmousedown=el.ontouchstart=(e)=>{
            const ev = e.touches ? e.touches[0] : e; mx = ev.clientX; my = ev.clientY;
            document.onmousemove = document.ontouchmove = (e) => {
                const ev2 = e.touches ? e.touches[0] : e; x = mx - ev2.clientX; y = my - ev2.clientY; 
                mx = ev2.clientX; my = ev2.clientY;
                el.style.top = (el.offsetTop - y) + "px"; el.style.left = (el.offsetLeft - x) + "px";
            };
            document.onmouseup = document.ontouchend = () => document.onmousemove = document.ontouchmove = null;
        };
    }

    function exportarFlyer() {
        html2canvas(document.getElementById("canvas"), { useCORS: true }).then(canvas => {
            const link = document.createElement('a'); link.download = 'Flyer_Pachucos_Men.png';
            link.href = canvas.toDataURL(); link.click();
        });
    }

    function renderCal() { 
        document.getElementById('cal-box').innerHTML = `<iframe src="https://calendar.google.com/calendar/embed?wkst=1&bgcolor=%23000000&src=ZXMubWV4aWNhbiNob2xpZGF5QGdyb3VwLnYuY2FsZW5kYXIuZ29vZ2xlLmNvbQ" style="border:0" width="100%" height="400" frameborder="0"></iframe>`; 
    }
    
    function compartirAgenda() {
        let t = "*AGENDA OFICIAL PACHUCOS MEN*\n\n";
        agenda.forEach(f => t += `🔥 ${f.dia}/${f.mes}/${f.anio} - ${f.lugar}\n`);
        window.open(`https://wa.me/?text=${encodeURIComponent(t)}`);
    }

    function initSignaturePads() {
        [document.getElementById('p1'), document.getElementById('p2')].forEach(c => {
            const ctx = c.getContext('2d'); let drawing = false;
            c.onmousedown = c.ontouchstart = () => drawing = true;
            c.onmouseup = c.ontouchend = () => { drawing = false; ctx.beginPath(); };
            c.onmousemove = c.ontouchmove = (e) => {
                if(!drawing) return; const ev = e.touches ? e.touches[0] : e; const r = c.getBoundingClientRect();
                ctx.lineTo(ev.clientX - r.left, ev.clientY - r.top); ctx.stroke();
            };
        });
    }

    setInterval(loadAgenda, 30000);
    window.onload = () => { initSignaturePads(); ver('age'); };
</script>
</body>
    </html>
