<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PACHUCOS MEN 2026</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --gris: #111; --rojo: #cc0000; }
        * { box-sizing: border-box; }
        body { background: var(--fondo); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR AL COSTADO */
        #sidebar { width: 240px; background: #0a0a0a; border-right: 1px solid #222; display: flex; flex-direction: column; padding-top: 20px; flex-shrink: 0; }
        .nav-btn { background: transparent; border: none; color: #555; padding: 18px 25px; text-align: left; font-size: 14px; cursor: pointer; border-left: 4px solid transparent; transition: 0.3s; font-weight: bold; text-transform: uppercase; }
        .nav-btn.active { color: var(--oro); border-left: 4px solid var(--oro); background: #111; }
        
        main { flex: 1; padding: 25px; overflow-y: auto; background: radial-gradient(circle at top, #111, #000); }
        .section { display: none; max-width: 900px; margin: 0 auto; }
        .section.active { display: block; }
        
        /* AGENDA MINIMALISTA */
        .mes-header { color: var(--oro); font-size: 22px; border-bottom: 1px solid #333; margin: 25px 0 10px; padding-bottom: 5px; text-transform: uppercase; }
        .jale-card { background: var(--gris); border: 1px solid #222; padding: 15px; margin-bottom: 8px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .jale-card h3 { margin: 0; font-size: 18px; color: #fff; }
        .btn-del { color: var(--rojo); background: none; border: 1px solid var(--rojo); padding: 5px 10px; cursor: pointer; border-radius: 4px; }

        /* FORMULARIOS */
        input, select { width: 100%; padding: 14px; margin: 8px 0; background: #0a0a0a; border: 1px solid #333; color: white; border-radius: 5px; font-size: 16px; }
        .btn-japo { background: var(--oro); color: black; border: none; padding: 18px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        .btn-cancel { background: #333; color: white; }

        /* FLYER */
        #canvas { width: 100%; height: 500px; border: 2px solid var(--oro); position: relative; overflow: hidden; background: white; border-radius: 5px; }
        .asset-row { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; border-bottom: 1px solid #222; }
        .thumb { width: 75px; height: 75px; object-fit: cover; border: 1px solid #444; cursor: pointer; flex-shrink: 0; }
        .drag { position: absolute; cursor: move; user-select: none; white-space: nowrap; }

        /* CONTRATOS */
        canvas.sig { background: white; width: 100%; height: 130px; border-radius: 5px; touch-action: none; border: 1px solid var(--oro); }
    </style>
</head>
<body>

<nav id="sidebar">
    <div style="text-align:center; padding-bottom:30px;"><h2 style="color:var(--oro); letter-spacing:2px; margin:0;">PACHUCOS</h2><small style="color:#555">2026</small></div>
    <button class="nav-btn active" onclick="ver('age')">📝 AGENDA</button>
    <button class="nav-btn" onclick="ver('add')">➕ AGREGAR FECHA</button>
    <button class="nav-btn" onclick="ver('cal')">📅 CALENDARIO</button>
    <button class="nav-btn" onclick="ver('gal')">🖼️ GALERÍA</button>
    <button class="nav-btn" onclick="ver('fly')">🎨 FLYERS</button>
    <button class="nav-btn" onclick="ver('con')">📜 CONTRATOS</button>
</nav>

<main>
    <section id="age" class="section active">
        <h1 style="color:var(--oro); margin:0;">PACHUCOS 2026</h1>
        <div id="lista-agenda">Sincronizando...</div>
    </section>

    <section id="add" class="section">
        <h1>AGREGAR TOCADA</h1>
        <div style="display:flex; gap:10px;">
            <input type="number" id="f-anio" value="2026">
            <select id="f-mes">
                <option value="1">Enero</option><option value="2">Febrero</option><option value="3">Marzo</option>
                <option value="4">Abril</option><option value="5">Mayo</option><option value="6">Junio</option>
                <option value="7">Julio</option><option value="8">Agosto</option><option value="9">Septiembre</option>
                <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
            </select>
            <input type="number" id="f-dia" placeholder="Día">
        </div>
        <select id="f-rep">
            <option value="">¿Quién agendó?</option>
            <option value="JOSÉ">JOSÉ</option><option value="CHAVA">CHAVA</option><option value="TOÑO">TOÑO</option><option value="OTROS">OTROS</option>
        </select>
        <input type="text" id="f-lug" placeholder="¿Dónde? (Lugar)">
        <input type="text" id="f-hor" placeholder="Hora de inicio">
        <input type="text" id="f-tie" placeholder="Cantidad de horas">
        <button class="btn-japo" onclick="confirmar('guardar')">GUARDAR FECHA</button>
        <button class="btn-japo btn-cancel" onclick="confirmar('cancelar')">CANCELAR</button>
    </section>

    <section id="cal" class="section">
        <h1 id="cal-tit" style="color:var(--oro);">CALENDARIO</h1>
        <div id="calendario-visual" style="background:#111; padding:20px; border-radius:10px;"></div>
    </section>

    <section id="gal" class="section">
        <h1>GALERÍA (BODEGA)</h1>
        <div id="gal-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
    </section>

    <section id="fly" class="section">
        <h1>DISEÑADOR</h1>
        <div id="canvas"></div>
        <input type="text" id="fly-txt" placeholder="Escribe aquí el texto" style="margin-top:10px;">
        <p>Fondos:</p><div class="asset-row" id="l-fnd"></div>
        <p>Logos:</p><div class="asset-row" id="l-log"></div>
        <p>Títulos:</p><div class="asset-row" id="l-tit"></div>
        <p>Fechas:</p><div class="asset-row" id="l-fec"></div>
        <p>Eslogan:</p><div class="asset-row" id="l-esl"></div>
        <button class="btn-japo" onclick="crearTxt()">GENERAR TEXTO</button>
    </section>

    <section id="con" class="section">
        <h1>CONTRATOS</h1>
        <input type="text" placeholder="Representante / Cliente">
        <div style="display:flex; gap:15px; margin-top:20px;">
            <div style="flex:1; text-align:center;"><small>FIRMA REP.</small><canvas id="p1" class="sig"></canvas></div>
            <div style="flex:1; text-align:center;"><small>FIRMA CLIENTE</small><canvas id="p2" class="sig"></canvas></div>
        </div>
    </section>
</main>

<script>
    // --- DATOS GITHUB ---
    const USER = 'antoniozavalatolentino';
    const REPO = 'PMapp';
    const TOKEN = 'ghp_42y7mHwXwH6vXwHwH6vHwH6vXwHwH6vHw'; // YA PUESTO
    // --------------------

    let agenda = [];
    let estiloAct = { color: 'white' };
    const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

    async function ver(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelector(`[onclick="ver('${id}')"]`).classList.add('active');
        if(id === 'age') loadAgenda();
        if(id === 'cal') renderCal();
        if(id === 'gal') loadAssets('BODEGA', 'gal-grid');
        if(id === 'fly') {
            loadAssets('Flyers/01_FONDOS_Y_ESTILOS', 'l-fnd');
            loadAssets('Flyers/02_LOGOS_Y_PNGS', 'l-log');
            loadAssets('Flyers/03_ESTILO_TITULO', 'l-tit');
            loadAssets('Flyers/04_FECHAS_Y_ESTILOS', 'l-fec');
            loadAssets('Flyers/05_ESLOGAN_Y_FOT_GRUPO', 'l-esl');
        }
    }

    async function loadAgenda() {
        const r = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/agenda.json`, { headers: { Authorization: `token ${TOKEN}` } });
        const d = await r.json(); 
        const nueva = JSON.parse(atob(d.content));
        
        // Alerta de nuevo registro
        if(agenda.length > 0 && nueva.length > agenda.length) {
            const u = nueva[nueva.length-1];
            alert(`📢 ¡${u.representante} agregó nueva tocada para Pachucos Men!`);
        }

        const hoy = new Date(); hoy.setHours(0,0,0,0);
        // BORRADO AUTOMÁTICO: Solo deja fechas del día actual en adelante
        agenda = nueva.filter(f => new Date(f.anio, f.mes-1, f.dia) >= hoy);
        if(agenda.length !== nueva.length) await sync("Auto-limpieza");

        agenda.sort((a,b) => new Date(a.anio, a.mes-1, a.dia) - new Date(b.anio, b.mes-1, b.dia));
        
        let html = ""; let mes = "";
        agenda.forEach((f, i) => {
            if(mes !== `${f.mes}-${f.anio}`) {
                mes = `${f.mes}-${f.anio}`;
                html += `<div class="mes-header">${MESES[f.mes-1]} ${f.anio}</div>`;
            }
            html += `<div class="jale-card">
                <div><h3>${f.dia}/${f.mes} - ${f.representante}</h3><p>${f.lugar || '?'} | ${f.hora || '?'}</p></div>
                <button class="btn-del" onclick="borrar(${i})">BORRAR</button>
            </div>`;
        });
        document.getElementById('lista-agenda').innerHTML = html || "<p>Agenda vacía.</p>";
    }

    function confirmar(accion) {
        if(accion === 'cancelar') {
            if(confirm("¿Seguro que quieres cancelar? Se borrarán los datos escritos.")) ver('age');
        } else {
            const d=document.getElementById('f-dia').value, m=document.getElementById('f-mes').value, r=document.getElementById('f-rep').value;
            if(!d || !m || !r) return alert("Año, Mes, Día y Representante son obligatorios.");
            if(confirm("¿Guardar esta tocada en la agenda?")) guardar();
        }
    }

    async function guardar() {
        const j = { dia:document.getElementById('f-dia').value, mes:document.getElementById('f-mes').value, anio:document.getElementById('f-anio').value, representante:document.getElementById('f-rep').value, lugar:document.getElementById('f-lug').value||'?', hora:document.getElementById('f-hor').value||'?', tiempo:document.getElementById('f-tie').value||'?' };
        agenda.push(j);
        await sync("Nuevo jale"); alert("¡Guardado!"); ver('age');
    }

    async function sync(msg) {
        const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/agenda.json`, { headers: { Authorization: `token ${TOKEN}` } });
        const json = await res.json();
        await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/agenda.json`, {
            method: 'PUT', headers: { Authorization: `token ${TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msg, content: btoa(JSON.stringify(agenda)), sha: json.sha })
        });
    }

    async function borrar(i) { if(confirm("¿Borrar jale?")) { agenda.splice(i,1); await sync("Eliminado"); loadAgenda(); } }

    function renderCal() {
        const hoy = new Date();
        document.getElementById('cal-tit').innerText = `${MESES[hoy.getMonth()]} ${hoy.getFullYear()}`;
        document.getElementById('calendario-visual').innerHTML = `<iframe src="https://calendar.google.com/calendar/embed?height=400&wkst=1&bgcolor=%23000000&ctz=America%2FMexico_City&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=0&showCalendars=0&showTz=0&src=ZXMubWV4aWNhbiNob2xpZGF5QGdyb3VwLnYuY2FsZW5kYXIuZ29vZ2xlLmNvbQ&color=%230B8043" style="border:0" width="100%" height="400" frameborder="0" scrolling="no"></iframe>`;
    }

    async function loadAssets(folder, target) {
        const r = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${folder}`, { headers: { Authorization: `token ${TOKEN}` } });
        const files = await r.json();
        document.getElementById(target).innerHTML = files.map(f => `<img src="${f.download_url}" class="thumb" onclick="pick('${f.download_url}', '${folder}')">`).join('');
    }

    function pick(u, f) {
        if(f.includes('01_FONDOS')) {
            document.getElementById('canvas').style.backgroundImage = `url(${u})`;
            document.getElementById('canvas').style.backgroundSize = 'cover';
        } else if(f.includes('03_ESTILO') || f.includes('04_FECHAS')) {
            estiloAct.color = u.toUpperCase().includes('ORO') ? '#d4af37' : '#e5e5e5';
            alert("Estilo capturado. Escribe el texto y dale a generar.");
        } else {
            const img = document.createElement('img'); img.src = u; img.className = 'drag'; img.style.width = "120px";
            drag(img); document.getElementById('canvas').appendChild(img);
        }
    }

    function crearTxt() {
        const v = document.getElementById('fly-txt').value; if(!v) return;
        const d = document.createElement('div'); d.className = 'drag'; d.innerText = v.toUpperCase();
        d.style.color = estiloAct.color; d.style.fontSize = "40px"; d.style.fontWeight = "bold"; d.style.textShadow = "2px 2px 5px #000";
        drag(d); document.getElementById('canvas').appendChild(d);
    }

    function drag(el) {
        let x=0,y=0,mx=0,my=0;
        el.onmousedown = el.ontouchstart = (e) => {
            const ev = e.touches ? e.touches[0] : e; mx=ev.clientX; my=ev.clientY;
            document.onmousemove = document.ontouchmove = (e) => {
                const ev2 = e.touches ? e.touches[0] : e;
                x=mx-ev2.clientX; y=my-ev2.clientY; mx=ev2.clientX; my=ev2.clientY;
                el.style.top=(el.offsetTop-y)+"px"; el.style.left=(el.offsetLeft-x)+"px";
            };
            document.onmouseup = document.ontouchend = () => document.onmousemove = document.ontouchmove = null;
        };
    }

    function initPads() {
        [document.getElementById('p1'), document.getElementById('p2')].forEach(c => {
            const ctx = c.getContext('2d'); let d = false;
            c.onmousedown = c.ontouchstart = () => d = true;
            c.onmouseup = c.ontouchend = () => { d = false; ctx.beginPath(); };
            c.onmousemove = c.ontouchmove = (e) => {
                if(!d) return; const ev = e.touches ? e.touches[0] : e;
                const r = c.getBoundingClientRect(); ctx.lineTo(ev.clientX-r.left, ev.clientY-r.top); ctx.stroke();
            };
        });
    }

    setInterval(loadAgenda, 30000);
    window.onload = () => { initPads(); ver('age'); };
</script>
</body>
</html>
