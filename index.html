<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Oficial Pachucos Men</title>
    <style>
        /* ESTÉTICA ORIGINAL Y MEJORADA */
        :root { --oro: #f39c12; --oro-brillante: #ffcc00; --fondo: #121212; --tarjeta: #1e1e1e; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--fondo); color: white; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; }
        .header { text-align: center; padding: 15px; border-bottom: 2px solid var(--oro); margin-bottom: 15px; }
        
        /* FORMULARIO */
        .card-form { background: var(--tarjeta); padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        input, select { width: 100%; padding: 12px; margin: 5px 0; background: #000; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn-agendar { width: 100%; padding: 15px; background: linear-gradient(45deg, #f39c12, #d35400); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; }

        /* ESTADÍSTICAS */
        .stats-bar { display: flex; justify-content: space-around; background: #222; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--oro); color: var(--oro); font-weight: bold; }

        /* DISEÑO DE JALES AGRUPADOS */
        .dia-grupo { background: var(--tarjeta); margin-bottom: 20px; border-radius: 12px; border: 1px solid #444; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .dia-header { background: #333; padding: 12px; border-bottom: 2px solid var(--oro); color: var(--oro-brillante); font-weight: bold; font-size: 1.3em; text-align: center; }
        .evento-item { padding: 15px; border-bottom: 1px solid #333; position: relative; }
        .evento-item:last-child { border-bottom: none; }
        .hora-viva { color: #25d366; font-weight: bold; font-size: 1.1em; }
        .lugar-text { font-size: 1.2em; font-weight: bold; color: #fff; margin: 5px 0; }
        
        /* BOTÓN WHATSAPP */
        .btn-wa { display: inline-flex; align-items: center; background: #25d366; color: white; padding: 8px 15px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 14px; margin-top: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0; color:var(--oro);">PACHUCOS MEN</h1>
        <small>AGENDA PROFESIONAL</small>
    </div>

    <div id="stats" class="stats-bar">
        <span>Cargando...</span>
    </div>

    <div class="card-form">
        <div style="display: flex; gap: 5px;">
            <input type="number" id="dia" placeholder="Día">
            <input type="number" id="mes" placeholder="Mes">
            <input type="number" id="anio" value="2026">
        </div>
        <input type="text" id="lugar" placeholder="Lugar del evento">
        <select id="representante">
            <option value="TOÑO">TOÑO</option>
            <option value="CHAVA">CHAVA</option>
            <option value="JOSÉ">JOSÉ</option>
        </select>
        <div style="display: flex; gap: 5px;">
            <input type="time" id="hora_h" title="Hora de inicio">
            <input type="number" id="tiempo_h" placeholder="Horas de jale">
        </div>
        <button class="btn-agendar" onclick="guardarNuevoEvento()">AGENDAR Y SINCRONIZAR</button>
    </div>

    <div id="lista-eventos"></div>
</div>

<script>
    const GITHUB_TOKEN = "ghp_u0T7T3n9R1P1uN2Q1xZ5t9L7M0v2B1s4A5u3";
    const URL_REPO = "https://api.github.com/repos/Antozavala/Pachucos_Men_App/contents/agenda.json";
    let agendaData = [];

    async function init() {
        try {
            const res = await fetch(`${URL_REPO}?nocache=${Date.now()}`, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });
            const data = await res.json();
            const jsonString = decodeURIComponent(escape(atob(data.content)));
            agendaData = JSON.parse(jsonString);
            
            procesarAgenda();
        } catch (e) {
            document.getElementById('stats').innerText = "Error de conexión";
        }
    }

    function procesarAgenda() {
        // 1. AUTO-LIMPIEZA (Borra jales con más de 2 días de antigüedad)
        const hoy = new Date();
        hoy.setHours(0,0,0,0);
        const dosDiasEnMS = 2 * 24 * 60 * 60 * 1000;

        const originalLength = agendaData.length;
        agendaData = agendaData.filter(j => {
            const fechaJale = new Date(j.anio, j.mes - 1, j.dia);
            return (hoy - fechaJale) < dosDiasEnMS;
        });

        if (agendaData.length !== originalLength) {
            subirANube("Limpieza automática de fechas pasadas");
        } else {
            renderizarTodo();
        }
    }

    function renderizarTodo() {
        const lista = document.getElementById('lista-eventos');
        const stats = document.getElementById('stats');
        lista.innerHTML = "";
        
        // 2. ORDENAMIENTO JERÁRQUICO (Año, Mes, Día, Hora)
        agendaData.sort((a, b) => {
            const fechaA = new Date(a.anio, a.mes-1, a.dia, ...(a.hora_h || "00:00").split(':'));
            const fechaB = new Date(b.anio, b.mes-1, b.dia, ...(b.hora_h || "00:00").split(':'));
            return fechaA - fechaB;
        });

        // 3. AGRUPACIÓN VISUAL POR DÍA
        const grupos = {};
        let horasTotales = 0;

        agendaData.forEach(j => {
            const clave = `${j.dia}/${j.mes}/${j.anio}`;
            if (!grupos[clave]) grupos[clave] = [];
            grupos[clave].push(j);
            horasTotales += parseFloat(j.tiempo_h || 0);
        });

        for (const fecha in grupos) {
            const grupoDiv = document.createElement('div');
            grupoDiv.className = 'dia-grupo';
            grupoDiv.innerHTML = `<div class="dia-header">${fecha}</div>`;

            grupos[fecha].forEach(jale => {
                const txtWA = `*Jale Pachucos Men*%0A📅 Fecha: ${fecha}%0A⏰ Hora: ${jale.hora_h} hrs%0A📍 Lugar: ${jale.lugar}%0A⏳ Tiempo: ${jale.tiempo_h} hrs%0A👤 Encargado: ${jale.representante}`;
                
                grupoDiv.innerHTML += `
                    <div class="evento-item">
                        <span class="hora-viva">${jale.hora_h} hrs</span>
                        <div class="lugar-text">${jale.lugar}</div>
                        <div style="color:#aaa;">Encargado: ${jale.representante} | Duración: ${jale.tiempo_h} hrs</div>
                        <a href="https://wa.me/?text=${txtWA}" class="btn-wa">Compartir en WhatsApp</a>
                    </div>`;
            });
            lista.appendChild(grupoDiv);
        }

        stats.innerHTML = `<span>Eventos: ${agendaData.length}</span><span>Total Horas: ${horasTotales}</span>`;
    }

    async function guardarNuevoEvento() {
        const n = {
            dia: document.getElementById('dia').value,
            mes: document.getElementById('mes').value,
            anio: document.getElementById('anio').value,
            lugar: document.getElementById('lugar').value,
            representante: document.getElementById('representante').value,
            hora_h: document.getElementById('hora_h').value,
            tiempo_h: document.getElementById('tiempo_h').value
        };

        if(!n.lugar || !n.dia || !n.hora_h) return alert("¡Ey! Falta el lugar, la fecha o la hora.");

        agendaData.push(n);
        subirANube(`Nuevo jale agendado: ${n.lugar}`);
    }

    async function subirANube(msg) {
        try {
            const resGet = await fetch(URL_REPO, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
            const dataGet = await resGet.json();
            
            const resPut = await fetch(URL_REPO, {
                method: 'PUT',
                headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: msg,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(agendaData, null, 2)))),
                    sha: dataGet.sha
                })
            });

            if(resPut.ok) {
                alert("Sincronizado con éxito");
                renderizarTodo();
            }
        } catch (e) { alert("Error al subir datos."); }
    }

    init();
</script>
</body>
</html>
